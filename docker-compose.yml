version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_zj_60079
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123456
    ports:
      - "15079:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webhook-network

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webhook-network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:

networks:
  webhook-network:
    driver: bridge
