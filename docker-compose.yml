version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_zj_60079
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123456
    ports:
      - "15079:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webhook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d db_zj_60079"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webhook-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: webhook-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://dev:dev123456@postgres:5432/db_zj_60079?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "production"
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - webhook-network
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  postgres_data:
  redis_data:

networks:
  webhook-network:
    driver: bridge
